name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "pytest==8.*"
      - name: Check result-table consistency
        run: python -m antenna check
      - name: Run tests
        run: pytest
